# Set the rendering backend (GLX/OpenGL is required for modern blur)
backend = "glx";
vsync = true;

# Active and Inactive Opacity (Global settings)
active-opacity = 1.0;
inactive-opacity = 0.85;

# --- DWM SPECIFIC FIXES ---

# 1. Stop dwm window borders from becoming transparent
# (Without this, your window frame/borders will look glitchy and clear)
frame-opacity = 1.0;

# 2. Stop dwm statusbar from becoming transparent when unfocused
# dwm's bar doesn't have a static window ID, so we exclude it by position
focus-exclude = [
    "x = 0 && y = 0 && override_redirect = true"
];

# 3. Targeted Alacritty rules (Overrides global opacity)
# This keeps your Alacritty window exactly at your preferred opacity 
# regardless of whether it's focused or inactive.
opacity-rule = [
    "90:class_g = 'Alacritty' && focused",
    "80:class_g = 'Alacritty' && !focused"
];
